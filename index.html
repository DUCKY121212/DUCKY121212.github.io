*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  color:#fff;
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;

/* 🔥 FIRE BG */
.fire-bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 80%, rgba(255,0,0,.4), transparent 60%),
    radial-gradient(circle at 20% 30%, rgba(255,80,0,.3), transparent 55%),
    radial-gradient(circle at 80% 20%, rgba(255,0,40,.3), transparent 55%),
    #000;
  animation:fire 5s infinite alternate;
  z-index:-5;
}
@keyframes fire{
  from{filter:brightness(90%)}
  to{filter:brightness(140%)}
}

/* ember */
.ember{
  position:fixed;
  width:6px;
  height:6px;
  background:red;
  border-radius:50%;
  animation:float linear infinite;
}
@keyframes float{
  from{transform:translateY(110vh);opacity:.2}
  to{transform:translateY(-10vh);opacity:.9}
}

/* layout */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
}

/* avatar */
.avatar{
  width:160px;height:160px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid red;
  box-shadow:0 0 40px red;
  margin-bottom:15px;
}
.avatar img{width:100%;height:100%;object-fit:cover}

/* glitch text */
h1{
  font-size:2.8rem;
  position:relative;
  text-shadow:0 0 15px red;
  animation:glitch 1s infinite;
}
@keyframes glitch{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(2px,-2px)}
  60%{transform:translate(-1px,1px)}
  80%{transform:translate(1px,-1px)}
  100%{transform:translate(0)}
}

.bio{opacity:.8;margin-bottom:25px}

/* links */
.link{
  width:90%;
  max-width:360px;
  padding:14px;
  margin:6px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:#fff;
  background:rgba(255,0,0,.15);
  border:1px solid rgba(255,0,0,.4);
  transition:.25s;
}
.link:hover{
  transform:scale(1.07);
  background:rgba(255,0,0,.4);
  box-shadow:0 0 25px red;
}
.link img{
  width:26px;height:26px;
}

/* special server */
.server{
  background:linear-gradient(135deg,#ff0000,#ff6600);
  font-weight:700;
}
.server:hover{
  box-shadow:0 0 35px orange;
}

/* donate */

/* spotify */

  width:90%;
  max-width:350px;
  margin-top:25px;
}

/* mouse glow */
.cursor{
  position:fixed;
  width:20px;height:20px;
  border-radius:50%;
  background:red;
  pointer-events:none;
  mix-blend-mode:screen;
  filter:blur(8px);
}
</style>
