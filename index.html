<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM OVERRIDE • DERITMZX</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #ff0000;
        --bg: #050505;
        --glow: rgba(255, 0, 0, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
        background: var(--bg);
        color: var(--primary);
        font-family: 'Fira Code', monospace;
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* 📺 CRT SCANLINE */
    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }

    canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

    #cursor-glow {
        position: fixed;
        width: 150px; height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow) 0%, rgba(255,0,0,0) 70%);
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 50;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        z-index: 10;
    }

    .avatar {
        width: 180px; height: 180px;
        border: 3px solid var(--primary);
        box-shadow: 0 0 25px var(--glow);
        margin-bottom: 20px;
        background: #000;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .glitch-title {
        font-size: clamp(2rem, 8vw, 3.5rem);
        font-weight: 900;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 2px 2px var(--primary);
    }

    .status-bar {
        background: var(--primary);
        color: #000;
        padding: 2px 10px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .links-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 100%;
        max-width: 500px;
    }

    .link-card {
        padding: 15px;
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid var(--primary);
        text-decoration: none;
        color: var(--primary);
        text-align: center;
        transition: 0.3s;
        text-transform: uppercase;
    }

    .link-card:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 30px var(--primary);
    }

    .full-width { grid-column: span 2; }
    .server-btn { background: #fff; color: #000; font-weight: 900; border: none; }

    /* 🛠 BACKEND UI (ADMIN PANEL) */
    #admin-panel {
        display: none;
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        border: 2px solid var(--primary);
        padding: 20px;
        z-index: 1000;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 0 50px #000;
    }

    #admin-panel input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background: #000;
        border: 1px solid var(--primary);
        color: #fff;
        font-family: 'Fira Code', sans-serif;
    }

    .admin-btn {
        width: 100%;
        padding: 10px;
        background: var(--primary);
        color: #000;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .close-admin {
        color: #ff0000;
        float: right;
        cursor: pointer;
        margin-bottom: 10px;
    }

    /* Secret Login Trigger */
    #login-trigger {
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 20px;
        height: 20px;
        opacity: 0.05;
        z-index: 999;
    }

</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="cursor-glow"></div>

<div id="login-trigger" onclick="askPassword()"></div>

<div class="container">
    <div class="avatar">
        <img id="display-avatar" src="https://img1.pic.in.th/images/77706ead-4010-496c-9b6c-7521e38d8bf2.png">
    </div>
    <h1 class="glitch-title">DERITMZX</h1>
    <div class="status-bar">ACCESS GRANTED: GRADE 10 STUDENT // THAILAND</div>
    
    <div class="links-grid" id="links-container">
        </div>
</div>

<div id="admin-panel">
    <span class="close-admin" onclick="closeAdmin()">[CLOSE]</span>
    <h3>ADMIN BACKEND</h3>
    <p style="font-size: 0.7rem; margin-bottom: 10px;">Edit your links below:</p>
    <label>Instagram URL:</label>
    <input type="text" id="edit-ig">
    <label>Roblox Profile:</label>
    <input type="text" id="edit-roblox">
    <label>Discord ID Link:</label>
    <input type="text" id="edit-discord">
    <label>TSB Server Link:</label>
    <input type="text" id="edit-tsb">
    <label>Sailor Piece Link:</label>
    <input type="text" id="edit-sailor">
    <button class="admin-btn" onclick="saveData()">SAVE CHANGES</button>
</div>

<script>
    // --- ระบบจัดการข้อมูล ---
    const PASS = "24juuhh2";
    let defaultData = {
        ig: "https://instagram.com/ducky5.jpeg",
        roblox: "https://www.roblox.com/users/8183436850/profile",
        discord: "https://discordapp.com/users/848073028474765332",
        tsb: "https://www.roblox.com/share?code=eef4a88a1144294b80e110db7277e5df&type=Server",
        sailor: "https://www.roblox.com/share?code=0d8cefa1f410574aaa839b2d1edae0bc&type=Server"
    };

    // โหลดข้อมูลจาก Memory
    let currentData = JSON.parse(localStorage.getItem('mySiteData')) || defaultData;

    function renderLinks() {
        const container = document.getElementById('links-container');
        container.innerHTML = `
            <a href="${currentData.ig}" class="link-card" target="_blank">Instagram</a>
            <a href="${currentData.roblox}" class="link-card" target="_blank">Roblox</a>
            <a href="${currentData.discord}" class="link-card full-width" target="_blank">Discord Protocol</a>
            <a href="${currentData.tsb}" class="link-card server-btn" target="_blank">TSB SERVER</a>
            <a href="${currentData.sailor}" class="link-card server-btn" target="_blank">SALIOR PIECE 🔥</a>
            <a href="https://easydonate.app/fxlzry_" class="link-card full-width" target="_blank">DONATE / SUPPORT</a>
        `;
    }

    function askPassword() {
        let input = prompt("ENTER ACCESS KEY:");
        if (input === PASS) {
            openAdmin();
        } else {
            alert("ACCESS DENIED.");
        }
    }

    function openAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('edit-ig').value = currentData.ig;
        document.getElementById('edit-roblox').value = currentData.roblox;
        document.getElementById('edit-discord').value = currentData.discord;
        document.getElementById('edit-tsb').value = currentData.tsb;
        document.getElementById('edit-sailor').value = currentData.sailor;
    }

    function closeAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
    }

    function saveData() {
        currentData.ig = document.getElementById('edit-ig').value;
        currentData.roblox = document.getElementById('edit-roblox').value;
        currentData.discord = document.getElementById('edit-discord').value;
        currentData.tsb = document.getElementById('edit-tsb').value;
        currentData.sailor = document.getElementById('edit-sailor').value;
        
        localStorage.setItem('mySiteData', JSON.stringify(currentData));
        renderLinks();
        alert("SYSTEM UPDATED.");
        closeAdmin();
    }

    renderLinks();

    // --- Matrix & Effect (เหมือนต้นฉบับ) ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0000"; ctx.font = "16px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("01".charAt(Math.random()*2), i*16, y*16);
            if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
    document.addEventListener('mousemove', e => {
        const g = document.getElementById('cursor-glow');
        g.style.left = e.clientX + 'px'; g.style.top = e.clientY + 'px';
    });
</script>
</body>
</html>
