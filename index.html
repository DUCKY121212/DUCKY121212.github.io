<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM OVERRIDE • DERITMZX</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #ff0000;
        --bg: #050505;
        --glow: rgba(255, 0, 0, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
        background: var(--bg);
        color: var(--primary);
        font-family: 'Fira Code', monospace;
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* 📺 CRT SCANLINE */
    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }

    canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

    #cursor-glow {
        position: fixed;
        width: 150px; height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow) 0%, rgba(255,0,0,0) 70%);
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 50;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        z-index: 10;
        position: relative;
    }

    /* 💀 AVATAR */
    .avatar {
        width: 180px; height: 180px;
        border: 3px solid var(--primary);
        box-shadow: 0 0 25px var(--glow);
        margin-bottom: 20px;
        background: #000;
        position: relative;
    }

    .avatar img { 
        width: 100%; height: 100%; 
        object-fit: cover; 
        display: block;
    }

    /* 💻 MAIN UI ELEMENTS */
    .glitch-title {
        font-size: clamp(2rem, 8vw, 3.5rem);
        font-weight: 900;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 2px 2px var(--primary);
    }

    .status-bar {
        background: var(--primary);
        color: #000;
        padding: 2px 10px;
        font-weight: bold;
        margin-bottom: 5px;
        text-align: center;
    }

    /* 📊 VISITS/CLICKS BAR with [ADMIN] */
    .stats-bar {
        display: flex;
        gap: 10px;
        font-size: 0.8rem;
        margin-bottom: 15px;
    }

    .stat-box {
        border: 1px solid var(--primary);
        padding: 2px 10px;
        background: rgba(0,0,0,0.5);
    }

    .admin-trigger {
        background: #000;
        color: var(--primary);
        border: 1px solid var(--primary);
        cursor: pointer;
        padding: 2px 10px;
        transition: 0.3s;
    }

    .admin-trigger:hover {
        background: var(--primary);
        color: #000;
    }

    /* 🔗 LINKS GRID */
    .links-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 100%;
        max-width: 500px;
    }

    .link-card {
        padding: 15px;
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid var(--primary);
        text-decoration: none;
        color: var(--primary);
        text-align: center;
        transition: 0.3s;
        text-transform: uppercase;
        position: relative;
    }

    .link-card:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 30px var(--primary);
    }

    .full-width { grid-column: span 2; }
    .server-btn { background: #fff; color: #000; font-weight: 900; border: none; }

    /* 🎵 AUDIO PLAYER */
    .music-player {
        margin-top: 30px;
        width: 100%;
        max-width: 500px;
        border: 1px solid var(--primary);
        padding: 15px;
        background: rgba(0,0,0,0.9);
        text-align: center;
    }

    .play-btn {
        background: var(--primary);
        color: #000;
        border: none;
        padding: 10px 20px;
        font-family: 'Fira Code', monospace;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        text-transform: uppercase;
    }

    /* 🛠 ADMIN PANEL OVERLAY (Style based on image_1.png) */
    #admin-panel {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .admin-title {
        color: #fff;
        font-size: 3rem;
        font-weight: 900;
        text-shadow: 2px 2px #ff0000;
        margin-bottom: 10px;
    }

    .admin-subtitle {
        color: #000;
        background: var(--primary);
        font-weight: bold;
        padding: 2px 15px;
        margin-bottom: 30px;
    }

    .auth-form {
        border: 2px solid var(--primary);
        padding: 25px;
        width: 90%;
        max-width: 500px;
        text-align: left;
    }

    #password-input {
        width: 100%;
        padding: 12px;
        background: #000;
        border: 1px solid var(--primary);
        color: #fff;
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
        margin-bottom: 15px;
    }

    .admin-btn {
        width: 100%;
        padding: 12px;
        font-weight: bold;
        border: none;
        cursor: pointer;
        font-family: 'Fira Code', monospace;
    }

    .access-btn {
        background: var(--primary);
        color: #000;
        margin-bottom: 10px;
    }

    .back-btn {
        background: #000;
        color: var(--primary);
        border: 1px solid var(--primary);
        margin-top: 10px;
        width: auto;
        padding: 8px 15px;
    }
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="cursor-glow"></div>

<div class="container">
    <div class="avatar">
        <img id="display-avatar" src="https://img1.pic.in.th/images/77706ead-4010-496c-9b6c-7521e38d8bf2.png">
    </div>

    <h1 class="glitch-title">DERITMZX</h1>
    <div class="status-bar">ACCESS GRANTED: GRADE 10 STUDENT // THAILAND</div>
    
    <div class="stats-bar">
        <div class="stat-box">VISITS: 11</div>
        <div class="stat-box">CLICKS: 2</div>
        <div class="admin-trigger" onclick="openAdminPanel()">[ADMIN]</div>
    </div>
    
    <div class="links-grid">
        <a href="https://instagram.com/ducky5.jpeg" class="link-card" target="_blank">Instagram</a>
        <a href="https://www.roblox.com/users/8183436850/profile" class="link-card" target="_blank">Roblox</a>
        <a href="https://discordapp.com/users/848073028474765332" class="link-card full-width" target="_blank">Discord Protocol</a>
        <a href="https://www.roblox.com/share?code=eef4a88a1144294b80e110db7277e5df&type=Server" class="link-card server-btn" target="_blank">TSB SERVER</a>
        <a href="https://www.roblox.com/share?code=0d8cefa1f410574aaa839b2d1edae0bc&type=Server" class="link-card server-btn" target="_blank">SALIOR PIECE 🔥</a>
        <a href="https://easydonate.app/fxlzry_" class="link-card full-width" target="_blank">DONATE / SUPPORT</a>
    </div>

    <div class="music-player">
        <div style="font-size: 0.7rem; margin-bottom: 10px;">> EXECUTE_AUDIO_FILE.mp3</div>
        <button class="play-btn" id="audioControl">Play Music</button>
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<div id="admin-panel">
    <h1 class="admin-title">ADMIN</h1>
    <div class="admin-subtitle">SECURE TERMINAL // EDIT MODE</div>
    
    <div class="auth-form">
        <div style="font-size: 0.7rem; color: #ff0000; margin-bottom: 10px;">> AUTHENTICATE.exe</div>
        <input type="password" id="password-input" placeholder="ENTER PASSWORD">
        <button class="admin-btn access-btn" onclick="checkPassword()">ACCESS</button>
        <button class="admin-btn back-btn" onclick="closeAdminPanel()"> < BACK</button>
    </div>
</div>

<script>
    // --- ระบบจัดการข้อมูล ---
    const ADMIN_PASS = "24juuhh2"; // รหัสผ่านเข้าหลังบ้าน
    let currentData = {
        ig: "https://instagram.com/ducky5.jpeg",
        roblox: "https://www.roblox.com/users/8183436850/profile",
        discord: "https://discordapp.com/users/848073028474765332",
        tsb: "https://www.roblox.com/share?code=eef4a88a1144294b80e110db7277e5df&type=Server",
        sailor: "https://www.roblox.com/share?code=0d8cefa1f410574aaa839b2d1edae0bc&type=Server"
    };

    // --- ฟังก์ชัน ADMIN ---
    const panel = document.getElementById('admin-panel');
    const input = document.getElementById('password-input');

    function openAdminPanel() {
        panel.style.display = 'flex'; // แสดงหน้าหลังบ้าน
        input.value = ""; // ล้างช่องรหัส
        input.focus();
    }

    function closeAdminPanel() {
        panel.style.display = 'none'; // ซ่อนหน้าหลังบ้าน
    }

    function checkPassword() {
        if (input.value === ADMIN_PASS) {
            // ถ้ารหัสถูก ให้เปิดหน้าแก้ไข
            openDashboard(); 
        } else {
            alert("ACCESS DENIED.");
            input.value = "";
        }
    }

    // ฟังก์ชันนี้จะทำงานถ้ารหัสถูก (คุณต้องสร้างหน้า Dashboard เพิ่มในอนาคต)
    function openDashboard() {
        alert("ACCESS GRANTED. (You need to build the dashboard page)");
        // ตัวอย่าง: โหลดข้อมูล Instagram เดิมเข้าไปแก้
        let newIG = prompt("New Instagram URL:", currentData.ig);
        if(newIG) {
            currentData.ig = newIG;
            alert("Updated! (Note: Since this is just client-side JS, it will reset on reload. You need a real database for persistent saving.)");
        }
        closeAdminPanel();
    }

    // รองรับการกด Enter เพื่อล็อคอิน
    input.addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            checkPassword();
        }
    });

    // --- Matrix & Effect (เหมือนต้นฉบับ) ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const characters = "01";
    const fontSize = 16;
    const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0000"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 50);
    document.addEventListener('mousemove', e => {
        const glow = document.getElementById('cursor-glow');
        glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px';
    });
    const audio = document.getElementById('bgMusic');
    const btn = document.getElementById('audioControl');
    btn.addEventListener('click', () => {
        if (audio.paused) { audio.play(); btn.innerText = "Stop Music"; btn.style.background = "#fff";
        } else { audio.pause(); btn.innerText = "Play Music"; btn.style.background = "#ff0000"; }
    });
</script>
</body>
</html>
