<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM OVERRIDE • DERITMZX</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    /* 🔴 COLOR PALETTE */
    :root {
        --primary: #ff0000;
        --bg: #050505;
        --glow: rgba(255, 0, 0, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
        background: var(--bg);
        color: var(--primary);
        font-family: 'Fira Code', monospace;
        overflow-x: hidden;
        height: 100vh;
    }

    /* 📺 CRT SCANLINE EFFECT */
    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }

    /* 💾 MATRIX CANVAS */
    canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

    /* 🖱️ CURSOR GLOW EFFECT (โมใหม่!) */
    #cursor-glow {
        position: fixed;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow) 0%, rgba(255,0,0,0) 70%);
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s;
        z-index: 50;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        position: relative;
        z-index: 10;
    }

    /* 💀 AVATAR GLITCH */
    .avatar {
        width: 180px; height: 180px;
        border-radius: 5px;
        border: 2px solid var(--primary);
        overflow: hidden;
        box-shadow: 0 0 20px var(--glow);
        margin-bottom: 20px;
        position: relative;
    }

    /* ⚡ แก้ไขลิงก์รูปให้แสดงผลได้ถูกต้องแล้ว */
    .avatar img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) contrast(1.2); }

    /* ⚡ GLITCH TEXT */
    .glitch-title {
        font-size: 3.5rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 5px;
        position: relative;
        color: #fff;
        text-shadow: 2px 2px var(--primary), -2px -2px #000;
    }

    .status-bar {
        background: var(--primary);
        color: #000;
        padding: 2px 10px;
        font-weight: bold;
        margin-bottom: 20px;
        animation: blink 0.8s infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* 🔗 HACKER LINKS */
    .links-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 100%;
        max-width: 500px;
    }

    .link-card {
        padding: 15px;
        background: rgba(255, 0, 0, 0.05);
        border: 1px solid var(--primary);
        text-decoration: none;
        color: var(--primary);
        font-size: 0.9rem;
        transition: 0.3s;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
    }

    .link-card::before {
        content: "> ";
    }

    .link-card:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 30px var(--primary);
        transform: translateY(-3px);
    }

    .full-width { grid-column: span 2; }

    .server-btn { background: #fff; color: #000; border: none; font-weight: 900; }

    /* 🎵 SPOTIFY TERM */
    .terminal-box {
        margin-top: 30px;
        width: 100%;
        max-width: 500px;
        border: 1px solid var(--primary);
        background: rgba(0,0,0,0.8);
    }

    .term-header {
        background: var(--primary);
        color: #000;
        padding: 5px 10px;
        font-size: 0.8rem;
        display: flex;
        justify-content: space-between;
    }
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="cursor-glow"></div>

<div class="container">
    <div class="avatar">
        <img src="https://img5.pic.in.th/file/secure-sv1/77706ead-4010-496c-9b6c-7521e38d8bf2.png" alt="[AVATAR_DERITMZX]">
    </div>

    <h1 class="glitch-title">DERITMZX</h1>
    <div class="status-bar">ACCESS GRANTED: GRADE 10 STUDENT // THAILAND</div>
    
    <div class="bio" id="bio-term" style="margin-bottom: 20px; border: 1px solid var(--primary); padding: 5px 10px; font-size: 0.8rem;">
        > Initializing roblox_script.lua...<br>
        > Loading high-performance hardware...<br>
        > Welcome, Master deritmzx.
    </div>

    <div class="links-grid">
        <a href="https://instagram.com/ducky5.jpeg" class="link-card" target="_blank">Instagram</a>
        <a href="https://www.roblox.com/users/8183436850/profile" class="link-card" target="_blank">Roblox</a>
        <a href="https://discordapp.com/users/848073028474765332" class="link-card full-width" target="_blank">Discord Protocol</a>
        
        <a href="https://www.roblox.com/share?code=f65e0c9944a4684885824e9b64c7d6b0&type=Server" class="link-card server-btn" target="_blank">EXECUTE: TSB SERVER</a>
        <a href="https://www.roblox.com/share?code=0d8cefa1f410574aaa839b2d1edae0bc&type=Server" class="link-card server-btn" target="_blank">EXECUTE: NEW MAP🔥</a>
        
        <a href="https://easydonate.app/fxlzry_" class="link-card full-width" style="border-style: dashed;" target="_blank">FUNDING / DONATE</a>
    </div>

    <div class="terminal-box">
        <div class="term-header">
            <span>Spotify_Player.sh</span>
            <span>● ● ●</span>
        </div>
        <iframe src="https://open.spotify.com/track/1oAwsWBovWRIp7qLMGPIet?si=e4cb3b1b02934011" 
        width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
    </div>
</div>

<script>
    // 💾 MATRIX EFFECT
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const characters = "010101010101010101010101";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0000";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    // 🖱️ MOUSE GLOW MOVEMENT (โมใหม่!)
    const cursorGlow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => {
        cursorGlow.style.left = e.clientX + 'px';
        cursorGlow.style.top = e.clientY + 'px';
    });

    // ⌨️ TYPEWRITER EFFECT
    const bioText = `> Initializing roblox_script.lua...\n> Loading high-performance hardware...\n> Welcome, Master deritmzx.`;
    let i = 0;
    function typeWriter() {
        if (i < bioText.length) {
            document.getElementById("bio-term").innerHTML += bioText.charAt(i);
            i++;
            setTimeout(typeWriter, 50);
        }
    }
    document.getElementById("bio-term").innerHTML = ""; // เคลียร์ของเก่าก่อนเริ่ม
    typeWriter();

</script>

</body>
</html>
