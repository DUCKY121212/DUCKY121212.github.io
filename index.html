<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM OVERRIDE • DERITMZX</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #ff0000;
        --bg: #050505;
        --glow: rgba(255, 0, 0, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
        background: var(--bg);
        color: var(--primary);
        font-family: 'Fira Code', monospace;
        overflow-x: hidden;
        height: 100vh;
    }

    /* 📺 CRT SCANLINE */
    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }

    canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

    #cursor-glow {
        position: fixed;
        width: 150px; height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow) 0%, rgba(255,0,0,0) 70%);
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 50;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        z-index: 10;
    }

    /* 💀 FIXED AVATAR */
    .avatar {
        width: 180px; height: 180px;
        border: 3px solid var(--primary);
        box-shadow: 0 0 25px var(--glow);
        margin-bottom: 20px;
        background: #000;
        position: relative;
    }

    /* ใช้ Direct Link ที่บอสให้มา */
    .avatar img { 
        width: 100%; height: 100%; 
        object-fit: cover; 
        display: block;
    }

    .glitch-title {
        font-size: 3.5rem;
        font-weight: 900;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 2px 2px var(--primary);
    }

    .status-bar {
        background: var(--primary);
        color: #000;
        padding: 2px 10px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .links-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 100%;
        max-width: 500px;
    }

    .link-card {
        padding: 15px;
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid var(--primary);
        text-decoration: none;
        color: var(--primary);
        text-align: center;
        transition: 0.3s;
        text-transform: uppercase;
    }

    .link-card:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 30px var(--primary);
    }

    .full-width { grid-column: span 2; }
    .server-btn { background: #fff; color: #000; font-weight: 900; border: none; }

    /* 🎵 HACKER AUDIO PLAYER */
    .music-player {
        margin-top: 30px;
        width: 100%;
        max-width: 500px;
        border: 1px solid var(--primary);
        padding: 15px;
        background: rgba(0,0,0,0.9);
        text-align: center;
    }

    .play-btn {
        background: var(--primary);
        color: #000;
        border: none;
        padding: 10px 20px;
        font-family: 'Fira Code', monospace;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        text-transform: uppercase;
    }

    .play-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="cursor-glow"></div>

<div class="container">
    <div class="avatar">
        <img src="https://img1.pic.in.th/images/77706ead-4010-496c-9b6c-7521e38d8bf2.png" alt="DERITMZX">
    </div>

    <h1 class="glitch-title">DERITMZX</h1>
    <div class="status-bar">ACCESS GRANTED: GRADE 10 STUDENT // THAILAND</div>
    
    <div class="links-grid">
        <a href="https://instagram.com/ducky5.jpeg" class="link-card" target="_blank">Instagram</a>
        <a href="https://www.roblox.com/users/8183436850/profile" class="link-card" target="_blank">Roblox</a>
        <a href="https://discordapp.com/users/848073028474765332" class="link-card full-width" target="_blank">Discord Protocol</a>
        
        <a href="https://www.roblox.com/share?code=eef4a88a1144294b80e110db7277e5df&type=Server" class="link-card server-btn" target="_blank">TSB SERVER</a>
        <a href="https://www.roblox.com/share?code=0d8cefa1f410574aaa839b2d1edae0bc&type=Server" class="link-card server-btn" target="_blank">SALIOR PIECE 🔥</a>
        
        <a href="https://easydonate.app/fxlzry_" class="link-card full-width" target="_blank">DONATE / SUPPORT</a>
    </div>

    <div class="music-player">
        <div style="font-size: 0.7rem; margin-bottom: 10px;">> EXECUTE_AUDIO_FILE.mp3</div>
        <button class="play-btn" id="audioControl">Play Music</button>
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
    // 💾 MATRIX BACKGROUND
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const characters = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0000";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    // 🖱️ MOUSE GLOW
    const cursorGlow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => {
        cursorGlow.style.left = e.clientX + 'px';
        cursorGlow.style.top = e.clientY + 'px';
    });

    // 🎵 AUDIO CONTROL
    const audio = document.getElementById('bgMusic');
    const btn = document.getElementById('audioControl');
    btn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            btn.innerText = "Stop Music";
            btn.style.background = "#fff";
        } else {
            audio.pause();
            btn.innerText = "Play Music";
            btn.style.background = "#ff0000";
        }
    });
</script>

</body>
</html>
