<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM OVERRIDE • DERITMZX</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #ff0000;
        --bg: #050505;
        --glow: rgba(255, 0, 0, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
        background: var(--bg);
        color: var(--primary);
        font-family: 'Fira Code', monospace;
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* 📺 CRT SCANLINE EFFECT */
    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }

    canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

    #cursor-glow {
        position: fixed;
        width: 150px; height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--glow) 0%, rgba(255,0,0,0) 70%);
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 50;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        z-index: 10;
    }

    .avatar {
        width: 180px; height: 180px;
        border: 3px solid var(--primary);
        box-shadow: 0 0 25px var(--glow);
        margin-bottom: 20px;
        background: #000;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .glitch-title {
        font-size: clamp(2rem, 8vw, 3.5rem);
        font-weight: 900;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 2px 2px var(--primary);
    }

    .status-bar {
        background: var(--primary);
        color: #000;
        padding: 2px 10px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    /* 📊 STATS & ADMIN BUTTON */
    .stats-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .stat-item {
        border: 1px solid var(--primary);
        padding: 2px 12px;
        font-size: 0.8rem;
        background: rgba(255,0,0,0.05);
    }

    .admin-btn-trigger {
        border: 1px solid var(--primary);
        padding: 2px 12px;
        font-size: 0.8rem;
        background: transparent;
        color: var(--primary);
        cursor: pointer;
        transition: 0.3s;
    }

    .admin-btn-trigger:hover {
        background: var(--primary);
        color: #000;
    }

    /* 🔗 LINKS GRID */
    .links-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 100%;
        max-width: 500px;
    }

    .link-card {
        padding: 15px;
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid var(--primary);
        text-decoration: none;
        color: var(--primary);
        text-align: center;
        transition: 0.3s;
        text-transform: uppercase;
    }

    .link-card:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 30px var(--primary);
    }

    .full-width { grid-column: span 2; }
    .server-style { background: #fff; color: #000; font-weight: 900; border: none; }

    /* 🛠 ADMIN OVERLAY (หน้ากากตอนกดแอดมิน) */
    #admin-overlay {
        display: none; /* ปิดไว้เป็นค่าเริ่มต้น */
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .admin-box {
        border: 2px solid var(--primary);
        padding: 30px;
        width: 90%;
        max-width: 450px;
        text-align: center;
    }

    .admin-input {
        width: 100%;
        padding: 12px;
        background: #000;
        border: 1px solid var(--primary);
        color: #fff;
        margin: 15px 0;
        font-family: 'Fira Code', monospace;
        outline: none;
    }

    .access-action {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: #000;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    /* ---------------------------------- */
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="cursor-glow"></div>

<div class="container">
    <div class="avatar">
        <img src="https://img1.pic.in.th/images/77706ead-4010-496c-9b6c-7521e38d8bf2.png" alt="DERITMZX">
    </div>

    <h1 class="glitch-title">DERITMZX</h1>
    <div class="status-bar">ACCESS GRANTED: GRADE 10 STUDENT // THAILAND</div>
    
    <div class="stats-row">
        <div class="stat-item">VISITS: 11</div>
        <div class="stat-item">CLICKS: 2</div>
        <div class="admin-btn-trigger" onclick="showLogin()">[ADMIN]</div>
    </div>

    <div class="links-grid" id="links-render">
        </div>
</div>

<div id="admin-overlay">
    <div style="color: #fff; font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; text-shadow: 2px 2px red;">ADMIN</div>
    <div style="background: red; color: #000; padding: 2px 10px; font-weight: bold; margin-bottom: 20px;">SECURE TERMINAL // EDIT MODE</div>
    
    <div class="admin-box">
        <div style="text-align: left; font-size: 0.7rem;">> AUTHENTICATE.exe</div>
        <input type="password" id="pass-field" class="admin-input" placeholder="ENTER PASSWORD">
        <button class="access-action" onclick="verifyAdmin()">ACCESS</button>
        <div style="margin-top: 15px; font-size: 0.8rem; cursor: pointer;" onclick="hideLogin()">[ BACK TO HOME ]</div>
    </div>
</div>

<script>
    const ADMIN_KEY = "24juuhh2";

    // ข้อมูลเริ่มต้น (แก้ไขตรงนี้ได้)
    let siteData = JSON.parse(localStorage.getItem('deritmzx_data')) || {
        ig: "https://instagram.com/ducky5.jpeg",
        roblox: "https://www.roblox.com/users/8183436850/profile",
        discord: "https://discordapp.com/users/848073028474765332",
        tsb: "https://www.roblox.com/share?code=eef4a88a1144294b80e110db7277e5df&type=Server",
        sailor: "https://www.roblox.com/share?code=0d8cefa1f410574aaa839b2d1edae0bc&type=Server"
    };

    // ฟังก์ชันแสดงปุ่มหน้าเว็บ
    function renderLinks() {
        const container = document.getElementById('links-render');
        container.innerHTML = `
            <a href="${siteData.ig}" class="link-card" target="_blank">Instagram</a>
            <a href="${siteData.roblox}" class="link-card" target="_blank">Roblox</a>
            <a href="${siteData.discord}" class="link-card full-width" target="_blank">Discord Protocol</a>
            <a href="${siteData.tsb}" class="link-card server-style" target="_blank">TSB SERVER</a>
            <a href="${siteData.sailor}" class="link-card server-style" target="_blank">SALIOR PIECE 🔥</a>
            <a href="https://easydonate.app/fxlzry_" class="link-card full-width" target="_blank">DONATE / SUPPORT</a>
        `;
    }

    // ระบบ Login
    function showLogin() {
        document.getElementById('admin-overlay').style.display = 'flex';
        document.getElementById('pass-field').focus();
    }

    function hideLogin() {
        document.getElementById('admin-overlay').style.display = 'none';
        document.getElementById('pass-field').value = "";
    }

    function verifyAdmin() {
        const input = document.getElementById('pass-field').value;
        if(input === ADMIN_KEY) {
            // ถ้ารหัสถูก ให้เปิดหน้าต่างแก้ไข (ในที่นี้ใช้ prompt ง่ายๆ ให้คุณแก้)
            const field = prompt("พิมพ์ชื่อสิ่งที่อยากแก้ (ig, roblox, discord, tsb, sailor):");
            if(siteData[field] !== undefined) {
                const newVal = prompt(`ใส่ลิงก์ใหม่สำหรับ ${field}:`, siteData[field]);
                if(newVal) {
                    siteData[field] = newVal;
                    localStorage.setItem('deritmzx_data', JSON.stringify(siteData));
                    renderLinks();
                    alert("บันทึกข้อมูลเรียบร้อย!");
                }
            } else {
                alert("ไม่พบหัวข้อนี้");
            }
            hideLogin();
        } else {
            alert("ACCESS DENIED: รหัสผ่านไม่ถูกต้อง");
        }
    }

    // --- ตกแต่ง Effect (Matrix) ---
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0000"; ctx.font = "16px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("01".charAt(Math.random()*2), i*16, y*16);
            if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
    document.addEventListener('mousemove', e => {
        const g = document.getElementById('cursor-glow');
        g.style.left = e.clientX + 'px'; g.style.top = e.clientY + 'px';
    });

    renderLinks(); // รันตอนโหลดเว็บ
</script>
</body>
</html>
